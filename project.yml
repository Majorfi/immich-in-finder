name: ImmichDrive
options:
  bundleIdPrefix: app.quub
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: QZSF4W9PK3
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "$(TARGET_NAME)"
    ENABLE_HARDENED_RUNTIME: "YES"
targets:
  ImmichDrive:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes: ["*.md", "**/*.md"]
      - path: Shared
        excludes: ["*.md", "**/*.md"]
    settings:
      base:
        # The .app is named Findich.app — Finder uses the container app's bundle
        # name as the label for the File Provider location in the sidebar. Bundle
        # id stays app.quub.immichdrive (signing/profiles already issued for it).
        PRODUCT_NAME: Findich
        PRODUCT_BUNDLE_IDENTIFIER: app.quub.immichdrive
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.generated.plist
      properties:
        CFBundleName: Findich
        CFBundleDisplayName: Findich
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: ""
    dependencies:
      - target: ImmichDriveFileProvider
        embed: true
      - sdk: FileProvider.framework
  ImmichDriveFileProvider:
    type: app-extension
    platform: macOS
    sources:
      - path: FileProvider
        excludes: ["*.md", "**/*.md"]
      - path: Shared
        excludes: ["*.md", "**/*.md"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quub.immichdrive.FileProvider
        CODE_SIGN_ENTITLEMENTS: FileProvider/FileProvider.entitlements
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: FileProvider/Info.generated.plist
      properties:
        CFBundleName: ImmichDriveFileProvider
        CFBundleDisplayName: Findich File Provider
        NSExtension:
          NSExtensionFileProviderDocumentGroup: QZSF4W9PK3.app.quub.immichdrive
          NSExtensionFileProviderSupportsEnumeration: true
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FileProviderExtension
    dependencies:
      - sdk: FileProvider.framework
  ImmichDriveTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes: ["*.md", "**/*.md"]
      - path: Shared
        excludes: ["*.md", "**/*.md"]
      - path: FileProvider
        excludes: ["*.md", "**/*.md"]
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: app.quub.immichdrive.Tests
    dependencies:
      - sdk: FileProvider.framework
schemes:
  ImmichDrive:
    build:
      targets:
        ImmichDrive: all
    run:
      config: Debug
  ImmichDriveTests:
    build:
      targets:
        ImmichDriveTests: [test]
    test:
      # Forwarded from the shell so live API tests can read them; expands via
      # xcodebuild's process environment. Unset -> the integration tests skip.
      environmentVariables:
        - variable: IMMICH_BASE_URL
          value: $(IMMICH_BASE_URL)
        - variable: IMMICH_API_KEY
          value: $(IMMICH_API_KEY)
      targets:
        - ImmichDriveTests
