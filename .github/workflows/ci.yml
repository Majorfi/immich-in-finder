name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: xcodebuild -version && swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app + extension (unsigned)
        run: |
          xcodebuild build \
            -project ImmichDrive.xcodeproj \
            -scheme ImmichDrive \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests (unsigned)
        run: |
          xcodebuild test \
            -project ImmichDrive.xcodeproj \
            -scheme ImmichDriveTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build probe (SwiftPM)
        run: swift build
